<script>

const slug = new URLSearchParams(window.location.search).get("slug");

if (!slug) {
    document.getElementById("app").innerHTML =
        "<h2 style='padding:50px;text-align:center'>Slug Missing</h2>";
    throw new Error("Slug Missing");
}

fetch(`https://deals.wajidtechs.com/bizbox/api?slug=${slug}`)
.then(response => response.json())
.then(data => {

    if (!data.status) {
        document.getElementById("app").innerHTML =
            "<h2 style='padding:50px;text-align:center'>Business Not Found</h2>";
        return;
    }

    const b = data.data;

    const heroImage = (b.images && b.images.length)
        ? b.images[0]
        : "https://images.unsplash.com/photo-1521737604893-d14cc237f11d";

    let gallery = "";

    (b.images || []).forEach(img => {
        gallery += `
            <img
                src="${img}"
                alt="Gallery Image"
                loading="lazy"
                onerror="this.style.display='none'"
            >
        `;
    });

    document.getElementById("app").innerHTML = `

<header class="hero"
style="
background:
linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
url('${heroImage}');
background-size:cover;
background-position:center;
">

${b.logo ? `<img class="logo" src="${b.logo}" alt="Logo">` : ''}

<h1>${b.business_name}</h1>

<p>${b.description || ''}</p>

<a class="btn" href="${b.actions.call}">
📞 Call Now
</a>

</header>

<section class="section">

<div class="card-box">
<h2>About Us</h2>
<p>${b.description || ''}</p>
<br>
<p>${b.address || ''}</p>
</div>

<div class="grid">

<div class="card">
📞<br>${b.mobile || ''}
</div>

<div class="card">
📧<br>${b.email || ''}
</div>

<div class="card">
📍<br>${b.location || ''}
</div>

</div>

</section>

<section class="section">

<h2 style="text-align:center;margin-bottom:30px">
Gallery
</h2>

<div class="gallery">
${gallery}
</div>

</section>

<section class="contact">

<h2>Contact ${b.business_name}</h2>

<br>

<p>${b.mobile || ''}</p>

<br>

<p>${b.email || ''}</p>

<br>

<a class="btn" href="${b.actions.call}">
Call Now
</a>

</section>

<a
class="whatsapp"
href="${b.actions.whatsapp}"
target="_blank">
💬
</a>

<footer>

© ${new Date().getFullYear()}
${b.business_name}

<br><br>

powered by

<a
href="https://wajidtechs.com"
target="_blank"
style="color:white;text-decoration:none;">
wajidtechs.com
</a>

</footer>

`;

})
.catch(error => {
    console.error(error);

    document.getElementById("app").innerHTML =
        "<h2 style='padding:50px;text-align:center'>API Error</h2>";
});

</script>
