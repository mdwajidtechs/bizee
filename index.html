<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Business Website</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    color:#333;
}

.hero{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:#fff;
    padding:20px;
    background-size:cover;
    background-position:center;
}

.logo{
    width:140px;
    height:140px;
    border-radius:50%;
    object-fit:cover;
    border:5px solid #fff;
    margin-bottom:20px;
}

.hero h1{
    font-size:50px;
    margin-bottom:15px;
}

.hero p{
    max-width:800px;
    line-height:1.8;
    margin-bottom:25px;
}

.btn{
    display:inline-block;
    padding:14px 28px;
    border-radius:50px;
    text-decoration:none;
    color:#fff;
    background:#25D366;
    margin:5px;
}

.section{
    max-width:1200px;
    margin:auto;
    padding:60px 20px;
}

.card{
    background:#fff;
    padding:30px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    margin-top:30px;
}

.gallery img{
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:15px;
}

.contact{
    background:#111;
    color:#fff;
    text-align:center;
    padding:70px 20px;
}

.contact p{
    margin:10px 0;
}

.whatsapp{
    position:fixed;
    right:20px;
    bottom:20px;
    width:65px;
    height:65px;
    border-radius:50%;
    background:#25D366;
    color:#fff;
    text-decoration:none;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:30px;
    box-shadow:0 5px 20px rgba(0,0,0,.3);
}

footer{
    background:#000;
    color:#fff;
    text-align:center;
    padding:20px;
}

.loader{
    text-align:center;
    padding:120px;
    font-size:24px;
}

.error{
    text-align:center;
    padding:100px 20px;
}
</style>
</head>
<body>

<div id="app">
    <div class="loader">Loading Business...</div>
</div>

<script>

const slug = new URLSearchParams(window.location.search).get("slug");

if(!slug){
    document.getElementById("app").innerHTML = `
        <div class="error">
            <h2>Slug Missing</h2>
            <p>Example: ?slug=wajidtechs-com</p>
        </div>
    `;
} else {

    fetch(`https://deals.wajidtechs.com/bizbox/api?slug=${slug}`)
    .then(response => response.json())
    .then(result => {

        if(!result.status || !result.data){
            throw new Error("Business not found");
        }

        const b = result.data;

        const heroImage =
            b.images && b.images.length
            ? b.images[0]
            : "https://images.unsplash.com/photo-1521737604893-d14cc237f11d";

        let gallery = "";

        if(Array.isArray(b.images)){
            b.images.forEach(img => {
                gallery += `
                    <img
                        src="${img}"
                        alt="Gallery"
                        loading="lazy"
                    >
                `;
            });
        }

        document.title = b.business_name;

        document.getElementById("app").innerHTML = `

            <section
                class="hero"
                style="
                    background:
                    linear-gradient(
                        rgba(0,0,0,.65),
                        rgba(0,0,0,.65)
                    ),
                    url('${heroImage}');
                "
            >

                <img
                    class="logo"
                    src="${b.logo}"
                    alt="${b.business_name}"
                >

                <h1>${b.business_name}</h1>

                <p>${b.description || ""}</p>

                <div>

                    <a
                        class="btn"
                        href="${b.actions.whatsapp}"
                        target="_blank"
                    >
                        WhatsApp
                    </a>

                    <a
                        class="btn"
                        href="${b.actions.call}"
                    >
                        Call Now
                    </a>

                </div>

            </section>

            <section class="section">

                <div class="card">

                    <h2>About Us</h2>

                    <br>

                    <p>${b.description || ""}</p>

                    <br>

                    <p>
                        <strong>Address:</strong><br>
                        ${b.address || "N/A"}
                    </p>

                </div>

                <h2
                    style="
                        text-align:center;
                        margin-top:50px;
                    "
                >
                    Gallery
                </h2>

                <div class="gallery">
                    ${gallery}
                </div>

            </section>

            <section class="contact">

                <h2>Contact ${b.business_name}</h2>

                <br>

                <p>📞 ${b.mobile}</p>

                <p>📧 ${b.email}</p>

                <br>

                <a
                    class="btn"
                    href="${b.actions.email}"
                >
                    Send Email
                </a>

            </section>

            <a
                class="whatsapp"
                href="${b.actions.whatsapp}?text=I%20have%20a%20query%20for%20my%20business"
                target="_blank"
            >
                💬
            </a>

            <footer>

                © ${new Date().getFullYear()}
                ${b.business_name}

                <br><br>

                Powered by

                <a
                    href="https://wajidtechs.com"
                    target="_blank"
                    style="
                        color:#fff;
                        text-decoration:none;
                    "
                >
                    wajidtechs.com
                </a>

            </footer>

        `;
    })
    .catch(error => {

        console.error(error);

        document.getElementById("app").innerHTML = `
            <div class="error">
                <h2>Unable to load business</h2>
                <p>Please check the slug and try again.</p>
            </div>
        `;
    });
}
</script>

</body>
</html>
