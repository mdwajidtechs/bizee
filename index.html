<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    color:#333;
}

.hero{
    height:90vh;
    background-size:cover;
    background-position:center;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:#fff;
    padding:20px;
    position:relative;
}

.hero::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.65);
}

.hero *{
    position:relative;
    z-index:2;
}

.logo{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    margin-bottom:20px;
    border:4px solid #fff;
}

.hero h1{
    font-size:3rem;
    margin-bottom:15px;
}

.hero p{
    max-width:700px;
    margin-bottom:20px;
}

.btn{
    display:inline-block;
    background:#25D366;
    color:#fff;
    text-decoration:none;
    padding:12px 25px;
    border-radius:50px;
    font-weight:bold;
}

.section{
    max-width:1200px;
    margin:auto;
    padding:60px 20px;
}

.card-box{
    background:#fff;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.address{
    margin-top:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    margin-top:30px;
}

.card{
    background:#fff;
    padding:25px;
    text-align:center;
    border-radius:12px;
    box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.center{
    text-align:center;
    margin-bottom:30px;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
}

.gallery img{
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:12px;
}

.contact{
    background:#111;
    color:#fff;
    text-align:center;
    padding:60px 20px;
}

.contact p{
    margin:10px 0;
}

.whatsapp{
    position:fixed;
    bottom:20px;
    right:20px;
    width:60px;
    height:60px;
    border-radius:50%;
    background:#25D366;
    color:#fff;
    text-decoration:none;
    font-size:30px;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 5px 20px rgba(0,0,0,.3);
}

footer{
    background:#000;
    color:#fff;
    text-align:center;
    padding:20px;
}

footer a{
    color:#fff;
    text-decoration:none;
}

.loading{
    text-align:center;
    padding:100px 20px;
    font-size:20px;
}
</style>
</head>
<body>

<div id="app">
    <div class="loading">Loading Business...</div>
</div>

<script>

const slug = new URLSearchParams(window.location.search).get("slug") || "wajidtechs-com";

fetch(`https://deals.wajidtechs.com/bizbox/api?slug=${slug}`)
.then(res => res.json())
.then(response => {

    const business = response.data || response;

    const heroImage =
        business.image1 ||
        "https://images.unsplash.com/photo-1521737604893-d14cc237f11d";

    let galleryHtml = "";

    for(let i=1;i<=5;i++){
        if(business[`image${i}`]){
            galleryHtml += `
                <img src="${business[`image${i}`]}" alt="">
            `;
        }
    }

    document.title = business.business_name;

    document.getElementById("app").innerHTML = `

    <header class="hero" style="background-image:url('${heroImage}')">

        ${
            business.logo
            ? `<img class="logo" src="${business.logo}" alt="Logo">`
            : ""
        }

        <h1>${business.business_name || ""}</h1>

        <p>${business.description || ""}</p>

        ${
            business.mobile
            ? `<a class="btn" href="tel:${business.mobile}">📞 Call Now</a>`
            : ""
        }

    </header>

    <section class="section">

        <div class="card-box">
            <h2>About Us</h2>
            <p>${business.description || ""}</p>

            ${
                business.address
                ? `
                <div class="address">
                    <strong>Address:</strong><br>
                    ${business.address.replace(/\n/g,"<br>")}
                </div>
                `
                : ""
            }
        </div>

        <div class="grid">

            ${
                business.mobile
                ? `<div class="card">📞<br>${business.mobile}</div>`
                : ""
            }

            ${
                business.email
                ? `<div class="card">📧<br>${business.email}</div>`
                : ""
            }

            ${
                business.location
                ? `<div class="card">📍<br>${business.location}</div>`
                : ""
            }

        </div>

    </section>

    <section class="section">

        <h2 class="center">Gallery</h2>

        <div class="gallery">
            ${galleryHtml}
        </div>

    </section>

    <section class="contact">

        <h2>Contact ${business.business_name || ""}</h2>

        ${
            business.mobile
            ? `<p>📞 ${business.mobile}</p>`
            : ""
        }

        ${
            business.email
            ? `<p>📧 ${business.email}</p>`
            : ""
        }

        ${
            business.mobile
            ? `<a class="btn" href="tel:${business.mobile}">Call Now</a>`
            : ""
        }

    </section>

    ${
        business.mobile
        ? `
        <a class="whatsapp"
        target="_blank"
        href="https://wa.me/${business.mobile.replace(/[^0-9]/g,'')}">
        💬
        </a>
        `
        : ""
    }

    <footer>
        © ${new Date().getFullYear()} ${business.business_name}
        <h5 style="margin-top:10px;">
            powered by
            <a href="https://wajidtechs.com" target="_blank">
                wajidtechs.com
            </a>
        </h5>
    </footer>
    `;

})
.catch(error => {

    document.getElementById("app").innerHTML = `
        <div class="loading">
            Failed to load business data.
        </div>
    `;

    console.error(error);
});
</script>

</body>
</html>
