<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading Business...</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:'Poppins',sans-serif;
    background:#f5f7fb;
    color:#222;
    overflow-x:hidden;
}

.loading{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:22px;
    font-weight:600;
}

.hero{
    min-height:100vh;
    background-size:cover;
    background-position:center;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:30px;
    position:relative;
}

.hero::before{
    content:'';
    position:absolute;
    inset:0;
    background:linear-gradient(
        135deg,
        rgba(0,0,0,.85),
        rgba(0,0,0,.55)
    );
}

.hero-content{
    position:relative;
    z-index:2;
    max-width:900px;
    animation:fadeUp 1s ease;
}

.logo{
    width:140px;
    height:140px;
    border-radius:50%;
    object-fit:cover;
    border:5px solid #fff;
    margin-bottom:20px;
    box-shadow:0 15px 40px rgba(0,0,0,.4);
}

.hero h1{
    color:#fff;
    font-size:4rem;
    margin-bottom:15px;
    font-weight:800;
}

.hero p{
    color:#f1f1f1;
    font-size:1.1rem;
    line-height:1.8;
    margin-bottom:25px;
}

.btn{
    display:inline-block;
    padding:14px 30px;
    background:#25D366;
    color:#fff;
    text-decoration:none;
    border-radius:50px;
    font-weight:700;
    transition:.3s;
}

.btn:hover{
    transform:translateY(-4px);
}

.section{
    max-width:1200px;
    margin:auto;
    padding:80px 20px;
}

.section-title{
    text-align:center;
    margin-bottom:40px;
}

.section-title h2{
    font-size:2.5rem;
    margin-bottom:10px;
}

.about-box{
    background:#fff;
    padding:40px;
    border-radius:25px;
    box-shadow:0 10px 40px rgba(0,0,0,.08);
}

.about-box p{
    line-height:1.9;
}

.address{
    margin-top:25px;
    font-size:15px;
}

.info-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
    margin-top:40px;
}

.info-card{
    background:#fff;
    padding:30px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
    transition:.3s;
}

.info-card:hover{
    transform:translateY(-8px);
}

.info-card .icon{
    font-size:35px;
    margin-bottom:15px;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
}

.gallery img{
    width:100%;
    height:260px;
    object-fit:cover;
    border-radius:20px;
    transition:.4s;
}

.gallery img:hover{
    transform:scale(1.04);
}

.contact{
    background:#111;
    color:#fff;
    text-align:center;
    padding:80px 20px;
}

.contact h2{
    margin-bottom:20px;
}

.contact p{
    margin:10px 0;
}

.contact .btn{
    margin-top:20px;
}

.whatsapp{
    position:fixed;
    bottom:25px;
    right:25px;
    width:65px;
    height:65px;
    border-radius:50%;
    background:#25D366;
    color:#fff;
    text-decoration:none;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:30px;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
    z-index:999;
}

footer{
    background:#000;
    color:#fff;
    text-align:center;
    padding:25px;
}

footer a{
    color:#fff;
    text-decoration:none;
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@media(max-width:768px){

    .hero h1{
        font-size:2.4rem;
    }

    .hero p{
        font-size:15px;
    }

    .logo{
        width:110px;
        height:110px;
    }

    .section-title h2{
        font-size:2rem;
    }
}
</style>
</head>
<body>

<div id="app">
    <div class="loading">Loading Business...</div>
</div>

<script>

const slug = new URLSearchParams(window.location.search).get("slug") || "wajidtechs-com";

const API_URL =
`https://deals.wajidtechs.com/bizbox/api?slug=${slug}`;

const BASE_URL = "https://deals.wajidtechs.com/";

fetch(API_URL)
.then(res => res.json())
.then(response => {

    if(!response.status || !response.data){
        throw new Error("Business not found");
    }

    const business = response.data;

    document.title =
    business.business_name || "Business Page";

    const logo =
        business.logo
        ? (business.logo.startsWith("http")
            ? business.logo
            : BASE_URL + business.logo)
        : "";

    const heroImage =
        business.image1
        ? (business.image1.startsWith("http")
            ? business.image1
            : BASE_URL + business.image1)
        : "https://images.unsplash.com/photo-1521737604893-d14cc237f11d";

    let galleryHtml = "";

    for(let i=1;i<=5;i++){

        const image = business[`image${i}`];

        if(image){

            const imgUrl =
                image.startsWith("http")
                ? image
                : BASE_URL + image;

            galleryHtml += `
                <img src="${imgUrl}" alt="Gallery Image">
            `;
        }
    }

    document.getElementById("app").innerHTML = `

    <section
    class="hero"
    style="background-image:url('${heroImage}')">

        <div class="hero-content">

            ${
                logo
                ? `<img src="${logo}" class="logo">`
                : ""
            }

            <h1>${business.business_name || ""}</h1>

            <p>
                ${business.description || ""}
            </p>

            ${
                business.mobile
                ? `
                <a
                href="tel:${business.mobile}"
                class="btn">
                📞 Call Now
                </a>
                `
                : ""
            }

        </div>

    </section>

    <section class="section">

        <div class="section-title">
            <h2>About Us</h2>
        </div>

        <div class="about-box">

            <p>
                ${business.description || ""}
            </p>

            ${
                business.address
                ? `
                <div class="address">
                    <strong>📍 Address</strong><br><br>
                    ${business.address.replace(/\n/g,"<br>")}
                </div>
                `
                : ""
            }

        </div>

        <div class="info-grid">

            ${
                business.mobile
                ? `
                <div class="info-card">
                    <div class="icon">📞</div>
                    ${business.mobile}
                </div>
                `
                : ""
            }

            ${
                business.email
                ? `
                <div class="info-card">
                    <div class="icon">📧</div>
                    ${business.email}
                </div>
                `
                : ""
            }

            ${
                business.location
                ? `
                <div class="info-card">
                    <div class="icon">📍</div>
                    ${business.location}
                </div>
                `
                : ""
            }

        </div>

    </section>

    ${
        galleryHtml
        ? `
        <section class="section">

            <div class="section-title">
                <h2>Gallery</h2>
            </div>

            <div class="gallery">
                ${galleryHtml}
            </div>

        </section>
        `
        : ""
    }

    <section class="contact">

        <h2>
            Contact
            ${business.business_name || ""}
        </h2>

        ${
            business.mobile
            ? `<p>📞 ${business.mobile}</p>`
            : ""
        }

        ${
            business.email
            ? `<p>📧 ${business.email}</p>`
            : ""
        }

        ${
            business.mobile
            ? `
            <a
            href="tel:${business.mobile}"
            class="btn">
            Call Now
            </a>
            `
            : ""
        }

    </section>

    ${
        business.mobile
        ? `
        <a
        class="whatsapp"
        target="_blank"
        href="https://wa.me/${business.mobile.replace(/[^0-9]/g,'')}?text=Hi%20I%20have%20a%20query%20about%20your%20business">
        💬
        </a>
        `
        : ""
    }

    <footer>

        © ${new Date().getFullYear()}
        ${business.business_name || ""}

        <div style="margin-top:12px;">
            Powered by
            <a
            href="https://wajidtechs.com"
            target="_blank">
            wajidtechs.com
            </a>
        </div>

    </footer>

    `;

})
.catch(error => {

    console.error(error);

    document.getElementById("app").innerHTML = `
        <div class="loading">
            Failed to load business information.
        </div>
    `;
});
</script>

</body>
</html>
